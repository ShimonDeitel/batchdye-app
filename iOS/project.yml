name: BatchDye
options:
  bundleIdPrefix: com.shimondeitel.tiedyelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatchDye:
    type: application
    platform: iOS
    sources:
      - path: BatchDye
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tiedyelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatchDye/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchDyeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchDyeTests
      - path: BatchDye.storekit
    dependencies:
      - target: BatchDye
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tiedyelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchDyeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchDyeUITests
    dependencies:
      - target: BatchDye
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tiedyelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatchDye:
    build:
      targets:
        BatchDye: all
        BatchDyeTests: [test]
        BatchDyeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BatchDye.storekit
    test:
      config: Debug
      storeKitConfiguration: BatchDye.storekit
      targets:
        - BatchDyeTests
        - BatchDyeUITests
    archive:
      config: Release
